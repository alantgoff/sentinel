# Render.com deployment config.
#
# Sentinel needs to stay live for 90 days past the bounty deadline (Bounty Terms §3.1).
# Free tier spins down after 15 min of inactivity — fine for the demo URL since the
# grader's first visit will wake it; for a guaranteed-on instance use a paid plan.
#
# Required environment variables (set in the Render dashboard, NEVER in this file):
#   BUYER_ACCOUNT_ID, BUYER_PRIVATE_KEY
#   SELLER_ACCOUNT_ID, SELLER_PRIVATE_KEY
#   GROQ_API_KEY  (or OPENAI_API_KEY + LLM_PROVIDER=openai)
#   SENTINEL_TOPIC_ID  (from `npm run smoke:hcs`)
#
# Deploy:
#   1. push this repo to GitHub
#   2. New +  →  Web Service  →  point at the repo
#   3. set the env vars above
#   4. deploy

services:
  - type: web
    name: sentinel
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: HEDERA_NETWORK
        value: testnet
      - key: MIRROR_NODE_URL
        value: https://testnet.mirrornode.hedera.com
      - key: PORT
        value: 3000
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: DEFAULT_AUTONOMOUS_CAP_HBAR
        value: 2
      - key: DEFAULT_DAILY_LIMIT_HBAR
        value: 20
      - key: DEFAULT_VELOCITY_WINDOW_SECONDS
        value: 300
      - key: DEFAULT_VELOCITY_MAX_TXNS
        value: 5
      # secrets — set these in the Render dashboard
      - key: BUYER_ACCOUNT_ID
        sync: false
      - key: BUYER_PRIVATE_KEY
        sync: false
      - key: SELLER_ACCOUNT_ID
        sync: false
      - key: SELLER_PRIVATE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SENTINEL_TOPIC_ID
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
