# Render.com deployment config.
#
# Aegis needs to stay live for 90 days past the bounty deadline (Bounty Terms §3.1).
# Free tier spins down after 15 min of inactivity — fine for the demo URL since the
# grader's first visit will wake it; for a guaranteed-on instance use a paid plan.
#
# Required environment variables (set in the Render dashboard, NEVER in this file):
#   BUYER_ACCOUNT_ID, BUYER_PRIVATE_KEY
#   UNDERWRITER_ACCOUNT_ID, UNDERWRITER_PRIVATE_KEY
#   GROQ_API_KEY  (or OPENAI_API_KEY + LLM_PROVIDER=openai) — only for the NL-buyer agent
#   AEGIS_TOPIC_ID  (from `npm run smoke:hcs`)
#
# Deploy:
#   1. push this repo to GitHub
#   2. New +  →  Web Service  →  point at the repo
#   3. set the env vars above
#   4. deploy

services:
  - type: web
    name: aegis
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: HEDERA_NETWORK
        value: testnet
      - key: MIRROR_NODE_URL
        value: https://testnet.mirrornode.hedera.com
      - key: PORT
        value: 3000
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: DEFAULT_R0_USD_HR
        value: 2.50
      - key: MAX_EXPOSURE_RATIO
        value: 0.5
      - key: PAYOUT_AUTONOMOUS_CAP_HBAR
        value: 10
      # secrets — set these in the Render dashboard
      - key: BUYER_ACCOUNT_ID
        sync: false
      - key: BUYER_PRIVATE_KEY
        sync: false
      - key: UNDERWRITER_ACCOUNT_ID
        sync: false
      - key: UNDERWRITER_PRIVATE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AEGIS_TOPIC_ID
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
